services:
  db:
    image: postgres:15
    container_name: zer0vuln-db-agent
    restart: unless-stopped
    environment:
      POSTGRES_DB: zer0vuln
      POSTGRES_USER: zer0vulnuser
      POSTGRES_PASSWORD: zer0vulnpass
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
volumes:
  db_data:

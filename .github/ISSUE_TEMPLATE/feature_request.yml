name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening: features that overlap with the paid Pro / Enterprise
        tier (multi-tenancy, SAML/SCIM, compliance dashboards, HA,
        commercial support) are not on the Community roadmap — please tag
        them with `enterprise-fit` if you still want to discuss.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Lead with the use-case, not the solution.
      placeholder: |
        Right now I have to manually X every Y because Zer0Vuln doesn't ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Your suggested approach. UI mockups / API sketches welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're less good.

  - type: dropdown
    id: scope
    attributes:
      label: Which surface would this touch?
      multiple: true
      options:
        - Frontend (React UI)
        - Sanic API (app.py)
        - Ingest server (server.py)
        - AI worker (automation/manual/defensive)
        - Vuln scanner
        - Agent — Windows
        - Agent — Linux
        - Documentation
        - Tooling / CI

  - type: checkboxes
    id: confirm
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and discussions for similar requests.
          required: true
        - label: This is not a paid Pro/Enterprise feature ask.
          required: true

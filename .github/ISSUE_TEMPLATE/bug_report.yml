name: Bug report
description: Report a defect in Zer0Vuln Community Edition.
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as
        you can — vague reports take days to triage, complete ones get
        fixed fast.

  - type: input
    id: version
    attributes:
      label: Version
      description: Commit SHA, release tag, or `docker image inspect zer0vuln-server-app`
      placeholder: e.g. v1.0.0 or 7fac513
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      multiple: true
      options:
        - Frontend (React UI)
        - Sanic API (app.py)
        - Ingest server (server.py)
        - AI worker (automation/manual/defensive)
        - Vuln scanner
        - Agent — Windows
        - Agent — Linux
        - Docker Compose stack
        - Documentation
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: |
        I expected X, but Y happened instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: The minimal sequence to trigger the bug from a fresh stack.
      placeholder: |
        1. `docker compose up -d`
        2. Open http://localhost:8000
        3. Click ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Output of `docker compose logs <service>` and/or agent stderr.
        Redact any secrets before pasting.
      render: shell

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Docker / Compose version, Python version if not using Docker.
      value: |
        - OS:
        - Docker:
        - Docker Compose:
        - Browser (if frontend bug):
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I'm running an unmodified clone (or I've described the change).
          required: true
        - label: This is not a security vulnerability (those go through SECURITY.md).
          required: true

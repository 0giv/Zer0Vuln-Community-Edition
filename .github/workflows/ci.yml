name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests + import smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps for native wheels
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            default-libmysqlclient-dev libldap2-dev libsasl2-dev gcc

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Byte-compile sanity check
        run: |
          python -m compileall -q app.py server.py ai_worker.py
          python -m compileall -q ai core scanners modules

      - name: Run test suite
        env:
          # Stubs so app/* modules import cleanly without a live stack.
          LICENSE_KEY: ci-shared-secret-1234567890abcdef
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: ci
        run: pytest -ra

  frontend:
    name: Frontend type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --silent
      - run: npx tsc --noEmit
      - run: npm run build

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build app image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: zer0vuln-community:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
